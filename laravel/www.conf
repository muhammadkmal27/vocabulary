[www]
user = www-data
group = www-data

listen = 9000

; Process Manager - Dynamic mode for production
pm = dynamic

; Maximum number of child processes
pm.max_children = 100

; Number of children created at startup
pm.start_servers = 20

; Minimum number of idle server processes
pm.min_spare_servers = 10

; Maximum number of idle server processes
pm.max_spare_servers = 70

; Maximum requests per child process before recycling (prevents memory leaks)
pm.max_requests = 500

; Request timeout
request_terminate_timeout = 60s

; Log slow requests
slowlog = /var/log/php-fpm-slow.log
request_slowlog_timeout = 5s
