name: CI/CD Pipeline - Build, Push and Deploy

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  LARAVEL_IMAGE_NAME: muhammadkmal27/vocabulary-laravel-app
  FRONTEND_IMAGE_NAME: muhammadkmal27/vocabulary-frontend-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # === Build & Push Laravel Backend ===
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Laravel Backend
        uses: docker/build-push-action@v5
        with:
          context: ./laravel
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.LARAVEL_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # === Build & Push Next.js Frontend ===
      - name: Build and push Next.js Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # === Copy config files to Server ===
      - name: Copy docker-compose and nginx config via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "docker-compose.prod.yml,nginx/default.conf"
          target: "/root/vocabulary"
          strip_components: 0

      # === Execute deployment commands on Server ===
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /root/vocabulary
            # Rename docker-compose.prod.yml to docker-compose.yml
            mv docker-compose.prod.yml docker-compose.yml
            
            # Log in to GitHub Container Registry on server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u muhammadkmal27 --password-stdin
            
            # Pull latest images and restart containers
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Run optimizations inside container
            docker exec vocabulary-laravel-prod php artisan config:cache
            docker exec vocabulary-laravel-prod php artisan route:cache
            docker exec vocabulary-laravel-prod php artisan view:cache
            docker exec vocabulary-laravel-prod php artisan migrate --force
