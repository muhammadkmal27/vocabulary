name: CI/CD Pipeline - Build, Push and Deploy

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  LARAVEL_IMAGE_NAME: muhammadkmal27/vocabulary-laravel-app
  FRONTEND_IMAGE_NAME: muhammadkmal27/vocabulary-frontend-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # === Build & Push Laravel Backend ===
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Laravel Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.LARAVEL_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # === Build & Push Next.js Frontend ===
      - name: Build and push Next.js Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # === Copy config files and Deploy ===
      - name: Deploy to Server
        run: |
          # Cipta direktori jika belum ada
          mkdir -p /root/vocabulary/nginx
          
          # Salin fail konfigurasi ke direktori sasaran
          cp docker-compose.prod.yml /root/vocabulary/docker-compose.yml
          cp nginx/default.conf /root/vocabulary/nginx/default.conf
          
          cd /root/vocabulary
          
          # Log masuk ke GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u muhammadkmal27 --password-stdin
          
          # Tarik image terbaru dan naikkan container
          docker compose pull
          docker compose up -d --remove-orphans
          
          # Restart Nginx untuk elakkan ralat 502 DNS cache
          docker compose restart nginx
          
          # Jalankan optimasi Laravel
          docker exec vocabulary-laravel-prod php artisan config:cache
          docker exec vocabulary-laravel-prod php artisan route:cache
          docker exec vocabulary-laravel-prod php artisan view:cache
          docker exec vocabulary-laravel-prod php artisan migrate --force
          
          # Bersihkan sisa imej dan build cache lama untuk elakkan disk penuh
          docker system prune -f
          docker builder prune -f


