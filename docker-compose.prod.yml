services:
  # === PostgreSQL 16 ===
  postgres:
    image: postgres:16-alpine
    container_name: vocabulary-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === Redis 7 ===
  redis:
    image: redis:7-alpine
    container_name: vocabulary-redis-prod
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === Laravel Backend App ===
  laravel-app:
    image: ghcr.io/muhammadkmal27/vocabulary-laravel-app:latest
    container_name: vocabulary-laravel-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    restart: unless-stopped

  # === Next.js Frontend App ===
  frontend-app:
    image: ghcr.io/muhammadkmal27/vocabulary-frontend-app:latest
    container_name: vocabulary-frontend-prod
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped

  # === Nginx Gateway ===
  nginx:
    image: nginx:alpine
    container_name: vocabulary-nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - laravel-app
      - frontend-app
    restart: unless-stopped

  # === Cloudflare Tunnel ===
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: vocabulary-tunnel-prod
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  postgres_prod_data:
  redis_prod_data:
